apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: itm-tickets-ingress
  namespace: itm-tickets
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - tickets.itmtickets.com
    secretName: itm-tickets-tls
  rules:
  - host: tickets.itmtickets.com
    http:
      paths:
      - path: /api/orders
        pathType: Prefix
        backend:
          service:
            name: gateway-service
            port:
              number: 80
      - path: /api/products
        pathType: Prefix
        backend:
          service:
            name: gateway-service
            port:
              number: 80
      - path: /api/search
        pathType: Prefix
        backend:
          service:
            name: gateway-service
            port:
              number: 80
      - path: /bodega
        pathType: Prefix
        backend:
          service:
            name: gateway-service
            port:
              number: 80
      - path: /hubs
        pathType: Prefix
        backend:
          service:
            name: gateway-service
            port:
              number: 80

name: Build & Push to Docker Hub

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service:
          - name: itm-gateway-api
            dockerfile: Itm.Gateway.Api/Dockerfile
          - name: itm-inventory-api
            dockerfile: Itm.Inventory.Api/Dockerfile
          - name: itm-order-api
            dockerfile: Order.Api/Dockerfile
          - name: itm-notification-api
            dockerfile: Notification.Api/Dockerfile
          - name: itm-product-api
            dockerfile: Itm.Product.Api/Dockerfile
          - name: itm-search-api
            dockerfile: Search.Api/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: |
          dotnet restore Itm.Gateway.Api/Itm.Gateway.Api.csproj
          dotnet restore Itm.Inventory.Api/Itm.Inventory.Api.csproj
          dotnet restore Order.Api/Order.Api.csproj
          dotnet restore Notification.Api/Notification.Api.csproj
          dotnet restore Itm.Product.Api/Itm.Product.Api.csproj
          dotnet restore Search.Api/Search.Api.csproj

      - name: Build solution
        run: |
          dotnet build Itm.Gateway.Api/Itm.Gateway.Api.csproj --no-restore --configuration Release
          dotnet build Itm.Inventory.Api/Itm.Inventory.Api.csproj --no-restore --configuration Release
          dotnet build Order.Api/Order.Api.csproj --no-restore --configuration Release
          dotnet build Notification.Api/Notification.Api.csproj --no-restore --configuration Release
          dotnet build Itm.Product.Api/Itm.Product.Api.csproj --no-restore --configuration Release
          dotnet build Search.Api/Search.Api.csproj --no-restore --configuration Release

      - name: Run tests
        run: echo "Tests passed (no test projects configured)"
        continue-on-error: true

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.name }}:${{ github.sha }}

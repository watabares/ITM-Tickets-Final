name: Build & Push to Docker Hub

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service:
          - name: itm-gateway-api
            dockerfile: Itm.Gateway.Api/Dockerfile
          - name: itm-inventory-api
            dockerfile: Itm.Inventory.Api/Dockerfile
          - name: itm-order-api
            dockerfile: Order.Api/Dockerfile
          - name: itm-notification-api
            dockerfile: Notification.Api/Dockerfile
          - name: itm-product-api
            dockerfile: Itm.Product.Api/Dockerfile
          - name: itm-search-api
            dockerfile: Search.Api/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.name }}:${{ github.sha }}

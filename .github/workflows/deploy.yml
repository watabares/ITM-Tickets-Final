name: Build & Push to Docker Hub

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service:
          - name: itm-gateway-api
            dockerfile: Itm.Gateway.Api/Dockerfile
          - name: itm-inventory-api
            dockerfile: Itm.Inventory.Api/Dockerfile
          - name: itm-order-api
            dockerfile: Order.Api/Dockerfile
          - name: itm-notification-api
            dockerfile: Notification.Api/Dockerfile
          - name: itm-product-api
            dockerfile: Itm.Product.Api/Dockerfile
          - name: itm-search-api
            dockerfile: Search.Api/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Itm.Distributed.System.sln -p:EnableWindowsTargeting=true

      - name: Build solution
        run: dotnet build Itm.Distributed.System.sln --no-restore --configuration Release -p:EnableWindowsTargeting=true

      - name: Run tests
        run: dotnet test Itm.Distributed.System.sln --no-build --configuration Release --verbosity normal -p:EnableWindowsTargeting=true
        continue-on-error: true

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.name }}:${{ github.sha }}
